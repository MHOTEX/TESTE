<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrado Flutuante com Verificação Automática</title>
    <style>
        /* Estilo do quadrado flutuante */
        #floating-square {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            background-color: white;
        }

        /* Cores dinâmicas */
        .green {
            background-color: green;
            color: white;
        }

        .red {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Quadrado Flutuante com Verificação Automática</h1>

    <!-- Quadrado flutuante -->
    <div id="floating-square">Verificando...</div>

    <script>
        // Simular o conteúdo dinâmico da página (isso pode ser atualizado em tempo real)
        const dynamicContent = {
            centralContent: "Star" // Altere para "Bomb" ou outra string para simular alterações
        };

        // Função para verificar o conteúdo do quadrado central
        function checkContent() {
            const square = document.getElementById('floating-square');

            if (dynamicContent.centralContent === 'Star') {
                square.classList.add('green');
                square.classList.remove('red');
                square.innerText = 'Estrela';
            } else if (dynamicContent.centralContent === 'Bomb') {
                square.classList.add('red');
                square.classList.remove('green');
                square.innerText = 'Bomba';
            } else {
                square.classList.remove('green', 'red');
                square.innerText = 'Nada';
            }
        }

        // Configurar a verificação para rodar a cada 2 segundos
        setInterval(checkContent, 2000);
    </script>
</body>
</html>
