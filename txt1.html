<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Dinâmica do HTML</title>
    <style>
        /* Estilo do quadrado flutuante */
        #floating-square {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            background-color: white;
        }
    </style>
</head>
<body>
    <h1>Verificação Dinâmica de Estrela ou Bomba</h1>

    <!-- Quadrado flutuante -->
    <div id="floating-square">🔍</div>

    <script>
        // Função para verificar o conteúdo do DOM em tempo real
        function checkHTML() {
            const square = document.getElementById('floating-square');

            // Capturar o quadrado central pelo seletor apropriado
            const centralElement = document.querySelector('#central') || document.querySelector('.central') || null;

            if (centralElement) {
                // Verificar o conteúdo do quadrado central
                if (centralElement.innerHTML.includes('star') || centralElement.innerHTML.includes('Star')) {
                    square.innerText = '⭐'; // Emoji de estrela
                } else if (centralElement.innerHTML.includes('bomb') || centralElement.innerHTML.includes('Bomb')) {
                    square.innerText = '💣'; // Emoji de bomba
                } else {
                    square.innerText = '🔍'; // Nenhum resultado
                }
            } else {
                square.innerText = '❓'; // Nenhum elemento central encontrado
            }
        }

        // Configurar a verificação para rodar a cada 2 segundos
        setInterval(checkHTML, 2000);
    </script>
</body>
</html>
