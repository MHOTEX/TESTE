<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrado Flutuante com Emojis</title>
    <style>
        /* Estilo do quadrado flutuante */
        #floating-square {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            background-color: white;
        }
    </style>
</head>
<body>
    <h1>Quadrado Flutuante com Emojis</h1>

    <!-- Quadrado flutuante -->
    <div id="floating-square">🔍</div>

    <script>
        // Simular o conteúdo dinâmico da página (isso pode ser atualizado em tempo real)
        const dynamicContent = {
            centralContent: "Star" // Altere para "Bomb" ou outra string para simular alterações
        };

        // Função para verificar o conteúdo do quadrado central
        function checkContent() {
            const square = document.getElementById('floating-square');

            if (dynamicContent.centralContent === 'Star') {
                square.innerText = '⭐'; // Emoji de estrela
            } else if (dynamicContent.centralContent === 'Bomb') {
                square.innerText = '💣'; // Emoji de bomba
            } else {
                square.innerText = '🔍'; // Emoji padrão (nada encontrado)
            }
        }

        // Configurar a verificação para rodar a cada 2 segundos
        setInterval(checkContent, 2000);
    </script>
</body>
</html>
