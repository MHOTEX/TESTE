<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrado Flutuante</title>
    <style>
        /* Estilo do quadrado flutuante */
        #floating-square {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            background-color: white;
        }

        /* Cores dinâmicas */
        .green {
            background-color: green;
            color: white;
        }

        .red {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Quadrado Flutuante</h1>

    <!-- Quadrado flutuante -->
    <div id="floating-square">Verificar</div>

    <script>
        // Simular o conteúdo dinâmico da página
        const dynamicContent = {
            centralContent: "Star" // Altere para "Bomb" para simular uma bomba
        };

        // Função para verificar o conteúdo do quadrado central
        function checkContent() {
            const square = document.getElementById('floating-square');

            if (dynamicContent.centralContent === 'Star') {
                square.classList.add('green');
                square.innerText = 'Estrela';
            } else if (dynamicContent.centralContent === 'Bomb') {
                square.classList.add('red');
                square.innerText = 'Bomba';
            } else {
                square.classList.remove('green', 'red');
                square.innerText = 'Nada';
            }
        }

        // Executar a verificação
        checkContent();
    </script>
</body>
</html>
